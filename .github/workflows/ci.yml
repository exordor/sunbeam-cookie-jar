name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: Verify and package extension
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Verify store assets
        run: npm run verify:store-assets

      - name: GitHub extension E2E
        env:
          USE_EXTENSION_ACTION_POPUP: "0"
          PREGRANT_GITHUB_HOST: "1"
          E2E_TIMEOUT_MS: "180000"
        run: xvfb-run --auto-servernum npm run test:e2e:github

      - name: Audit manifest permissions
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('dist/manifest.json', 'utf8'));
          if ((manifest.permissions || []).includes('<all_urls>')) {
            throw new Error('Manifest must not request <all_urls> as a required permission.');
          }
          if (manifest.host_permissions) {
            throw new Error('Manifest must not declare required host_permissions.');
          }
          const optional = manifest.optional_host_permissions || [];
          if (!optional.includes('http://*/*') || !optional.includes('https://*/*')) {
            throw new Error('Manifest must declare optional http/https host permissions.');
          }
          if (manifest.background || manifest.content_scripts) {
            throw new Error('Extension must not include background workers or content scripts.');
          }
          NODE

      - name: Package Chrome Web Store zip
        run: npm run package:store

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: sunbeam-cookie-jar-dist
          path: dist/

      - name: Upload Chrome Web Store zip
        uses: actions/upload-artifact@v4
        with:
          name: sunbeam-cookie-jar-store-zip
          path: release/*.zip

      - name: Upload store assets
        uses: actions/upload-artifact@v4
        with:
          name: sunbeam-cookie-jar-store-assets
          path: store-assets/

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sunbeam-cookie-jar-test-results
          path: test-results/
