name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example v0.2.0"
        required: true
        type: string

jobs:
  verify:
    name: Verify and build release assets
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release version
        run: npm run verify:release-version

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Verify store assets
        run: npm run verify:store-assets

      - name: GitHub extension E2E
        env:
          USE_EXTENSION_ACTION_POPUP: "0"
          PREGRANT_GITHUB_HOST: "1"
          E2E_TIMEOUT_MS: "180000"
        run: xvfb-run --auto-servernum npm run test:e2e:github

      - name: Audit manifest permissions
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('dist/manifest.json', 'utf8'));
          if ((manifest.permissions || []).includes('<all_urls>')) {
            throw new Error('Manifest must not request <all_urls> as a required permission.');
          }
          if (manifest.host_permissions) {
            throw new Error('Manifest must not declare required host_permissions.');
          }
          const optional = manifest.optional_host_permissions || [];
          if (!optional.includes('http://*/*') || !optional.includes('https://*/*')) {
            throw new Error('Manifest must declare optional http/https host permissions.');
          }
          if (manifest.background || manifest.content_scripts) {
            throw new Error('Extension must not include background workers or content scripts.');
          }
          NODE

      - name: Package Chrome Web Store zip
        run: npm run package:store

      - name: Generate checksum
        run: |
          VERSION="${RELEASE_TAG#v}"
          cd release
          sha256sum "sunbeam-cookie-jar-${VERSION}.zip" > "sunbeam-cookie-jar-${VERSION}.sha256"

      - name: Write release notes
        run: npm run write:release-notes

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: sunbeam-cookie-jar-release-assets
          path: |
            release/*.zip
            release/*.sha256
            release/release-notes.md

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Download release assets
        uses: actions/download-artifact@v5
        with:
          name: sunbeam-cookie-jar-release-assets
          path: release

      - name: Ensure release does not already exist
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists." >&2
            exit 1
          fi

      - name: Publish release
        run: |
          VERSION="${RELEASE_TAG#v}"
          gh release create "$RELEASE_TAG" \
            "release/sunbeam-cookie-jar-${VERSION}.zip#Sunbeam Cookie Jar ${RELEASE_TAG} extension zip" \
            "release/sunbeam-cookie-jar-${VERSION}.sha256#SHA-256 checksum" \
            --repo "$GITHUB_REPOSITORY" \
            --title "${RELEASE_TAG} - Sunbeam Cookie Jar" \
            --notes-file release/release-notes.md \
            --verify-tag \
            --latest
